<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<!-- displays site properly based on user's device -->
		<link rel="stylesheet" href="style.css" />
		<link
			rel="icon"
			type="image/png"
			sizes="32x32"
			href="./assets/images/favicon-32x32.png"
		/>

		<title>Frontend Mentor | Results summary component</title>

		<!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
		<style>
			.attribution {
				font-size: 11px;
				text-align: center;
			}
			.attribution a {
				color: hsl(228, 45%, 44%);
			}
		</style>
	</head>
	<body>
		<div class="card">
			<div class="card__results">
				<h3 class="results__title">Your Result</h3>
				<div class="results__score">
					<p class="score__main">76</p>
					<p class="score__total">of 100</p>
				</div>
				<div class="outcome">
					<h3 class="outcome__header">Great</h3>
					<p class="outcome__text">
						You scored higher than 65% of the people who have taken these tests.
					</p>
				</div>
			</div>
			<div class="card__summary">
				<h3 class="summary__heading">Summary</h3>
				<div class="summary__skills">
					<div class="skill skill--red">
						<div class="skill__left">
							<img
								class="skill__img"
								src="assets/images/icon-reaction.svg"
								alt=""
							/>
							<h3 class="skill__title skill__title--red">Reaction</h3>
						</div>
						<div class="skill__right">
							<p class="skill__out-of"><span class="black">80</span> / 100</p>
						</div>
					</div>

					<div class="skill skill--orangey">
						<div class="skill__left">
							<img
								class="skill__img"
								src="assets/images/icon-memory.svg"
								alt=""
							/>
							<h3 class="skill__title skill__title--orangey">Memory</h3>
						</div>
						<div class="skill__right">
							<p class="skill__out-of"><span class="black">92</span> / 100</p>
						</div>
					</div>
					<div class="skill skill--green">
						<div class="skill__left">
							<img
								class="skill__img"
								src="assets/images/icon-verbal.svg"
								alt=""
							/>
							<h3 class="skill__title skill__title--green">Verbal</h3>
						</div>
						<div class="skill__right">
							<p class="skill__out-of"><span class="black">61</span> / 100</p>
						</div>
					</div>
					<div class="skill skill--blue">
						<div class="skill__left">
							<img
								class="skill__img"
								src="assets/images/icon-visual.svg"
								alt=""
							/>
							<h3 class="skill__title skill__title--blue">Visual</h3>
						</div>
						<div class="skill__right">
							<p class="skill__out-of"><span class="black">92</span> / 100</p>
						</div>
					</div>
				</div>
				<div class="btn btn--blue"><a href="#">Continue</a></div>
			</div>
		</div>
		<!-- Your Result
  76
  of 100

  Great
  You scored higher than 65% of the people who have taken these tests.
  
  Summary

  Reaction
  80 / 100

  Memory
  92 / 100

  Verbal
  61 / 100

  Visual
  72 / 100

  Continue -->
	</body>
</html>
